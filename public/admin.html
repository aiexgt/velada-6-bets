<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RingKings | Admin</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Sidebar / Navigation -->
  <nav class="sidebar">
    <div class="logo">
      <span class="neon-text">RINGKINGS</span>
      <p>BETTING POOL</p>
    </div>
    <ul class="nav-links">
      <li><a href="/" style="text-decoration:none; color:inherit; display:flex; gap:10px; width:100%;"><i class="icon">📊</i> Dashboard</a></li>
      <li><a href="/votos.html" style="text-decoration:none; color:inherit; display:flex; gap:10px; width:100%;"><i class="icon">🥊</i> Votos</a></li>
      <li class="active"><a href="/admin.html" style="text-decoration:none; color:inherit; display:flex; gap:10px; width:100%;"><i class="icon">⚙️</i> Admin</a></li>
    </ul>
    <div class="base-bet-info">
      Apuesta Base: <span id="display-base-bet" class="highlight">Q0</span>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="content">

    <!-- Admin Section -->
    <section id="admin" class="page active">
      <header>
        <h1>Administración</h1>
        <p>Configuración y gestión del evento</p>
      </header>

      <div class="admin-grid">
        
        <!-- Configuración -->
        <div class="glass-panel">
          <h3>Configuración Global</h3>
          <form id="form-settings">
            <div class="form-group">
              <label for="admin-base-bet">Apuesta Base (Q)</label>
              <input type="number" id="admin-base-bet" required min="1">
            </div>
            <button type="submit" class="btn btn-primary">Guardar Configuración</button>
          </form>
        </div>

        <!-- Participantes -->
        <div class="glass-panel">
          <h3>Nuevo Participante</h3>
          <form id="form-participant">
            <div class="form-group">
              <label for="admin-participant-name">Nombre</label>
              <input type="text" id="admin-participant-name" required placeholder="Ej. Juan Pérez">
            </div>
            <button type="submit" class="btn btn-secondary">Agregar Participante</button>
          </form>
        </div>

        <!-- Nueva Pelea -->
        <div class="glass-panel" style="grid-column: 1 / -1;">
          <h3>Agregar Pelea</h3>
          <form id="form-fight" class="fight-form">
            <div class="flex-row">
              <div class="form-group w-50">
                <label for="admin-fighter-a">Contendiente A (Rojo)</label>
                <input type="text" id="admin-fighter-a" required placeholder="Esquina Roja">
              </div>
              <span class="vs">VS</span>
              <div class="form-group w-50">
                <label for="admin-fighter-b">Contendiente B (Azul)</label>
                <input type="text" id="admin-fighter-b" required placeholder="Esquina Azul">
              </div>
            </div>
            <button type="submit" class="btn btn-danger wide">Crear Nueva Pelea</button>
          </form>
        </div>

        <!-- Administrar Peleas Activas -->
        <div class="glass-panel" style="grid-column: 1 / -1;">
          <h3>Cerrar Peleas / Resultados Oficiales</h3>
          <div id="admin-fights-list" class="admin-fights-list">
            <!-- Renderizado dinámico de peleas pendientes para cerrar -->
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- Notification Toast -->
  <div id="toast" class="toast">Notificación</div>

  <script src="app.js"></script>
</body>
</html>
